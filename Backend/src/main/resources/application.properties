# ===== AplicańŃo =====
spring.application.name=storyboard-ai
server.port=8080

# ===== Banco de dados H2 (persistĻncia em arquivo) =====
spring.datasource.url=jdbc:h2:file:./data/storyboarddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Console H2 (acesso pelo navegador em http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Tamanho mßximo das requisiń§es (importante pra upload/retorno de imagens) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===== OpenAI API =====
openai.api.url=https://api.openai.com/v1/images/generations
openai.api.key=SUA_CHAVE_AQUI
openai.api.model=gpt-image-1-mini
openai.api.image-size=1024x1024
